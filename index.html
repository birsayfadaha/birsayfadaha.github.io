<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bir Sayfa Daha</title>

<style>
body{
  margin:0;
  font-family: system-ui, Arial;
  background: radial-gradient(circle at top, #2b3a67, #0b0b0b 70%);
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:40px 20px;
}

header h1{
  font-size:42px;
}

header p{
  color:#aaa;
}

/* BAŞLIKLAR */
.section-title{
  text-align:center;
  font-size:32px;
  margin-top:40px;
}

.sub-title{
  text-align:center;
  font-size:22px;
  margin-top:20px;
  color:#ccc;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  background:#151515;
  border-radius:14px;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card:hover{
  transform:scale(1.05);
}

.card iframe{
  width:100%;
  height:180px;
  border:none;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:#777;
}
</style>

</head>

<body>

<header>
  <h1>📖 Bir Sayfa Daha</h1>
  <p>Sesli kitaplar • Hikayeler • Klasikler</p>
</header>

<!-- SESLİ KITAP OZETLERI -->
<h2 class="section-title">Sesli Kitap Özetleri</h2>
<section class="grid" id="ozetler"></section>


<!-- SESLİ ROMANLAR -->
<h2 class="section-title">Sesli Romanlar</h2>
<section class="grid" id="romanlar"></section>

<!-- SESLİ ÖYKÜLER -->

<section class="grid" id="oykuler"></section>

<!-- SESLİ ŞİİRLER -->
<h2 class="section-title">Sesli Şiirler</h2>

<h3 class="sub-title">Videolar</h3>
<section class="grid" id="siir-videolar"></section>

<h3 class="sub-title">Shorts</h3>
<section class="grid" id="siir-shorts"></section>

<footer>
  © 2026 Bir Sayfa Daha - Yusuf Kızılca
</footer>

/* ===== RENDER ===== */

function render(list, targetId){
  const grid = document.getElementById(targetId);

}
