<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bir Sayfa Daha</title>

<style>
body{
  margin:0;
  font-family: system-ui, Arial;
  background: radial-gradient(circle at top, #2b3a67, #0b0b0b 70%);
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:40px 20px;
}

header h1{
  font-size:42px;
}

header p{
  color:#aaa;
}

/* SEARCH */
.search-box{
  display:flex;
  justify-content:center;
  margin:20px;
}

.search-box input{
  width:320px;
  padding:12px 16px;
  border-radius:25px;
  border:none;
  outline:none;
  background:#111;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:25px;   /* 👈 videolar arası boşluk */
  padding:30px;
}

/* CARD */
.card{
  background:#151515;
  border-radius:14px;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card:hover{
  transform:scale(1.05);
}

.card iframe{
  width:100%;
  height:180px;
  border:none;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:#777;
}
</style>

</head>

<body>

<header>
  <h1>📖 Bir Sayfa Daha</h1>
  <p>Sesli kitaplar • Hikayeler • Klasikler</p>
</header>

<div class="search-box">
  <input type="text" id="search" placeholder="Kitap ara...">
</div>

<section class="grid" id="grid"></section>

<footer>
  © 2026 Bir Sayfa Daha  -  Yusuf Kızılca
</footer>

<script>

/* VİDEOLAR */
const videos = [

  {id:"fQH2U1uMH-0"},
  {id:"BTxJuztfJ6s"}
];

/* RENDER */
const grid = document.getElementById("grid");

function render(list){
  grid.innerHTML = "";

  list.forEach(v=>{
    grid.innerHTML += `
      <div class="card">
        <iframe src="https://www.youtube.com/embed/${v.id}" allowfullscreen></iframe>
      </div>
    `;
  });
}

render(videos);

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
  let val = e.target.value.toLowerCase();

  let filtered = videos.filter(v =>
    v.id.toLowerCase().includes(val)
  );

  render(filtered);
});

</script>

</body>
</html>
