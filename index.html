<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bir Sayfa Daha</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
}

/* TOP BAR */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  background: rgba(0,0,0,0.8);
  position: sticky;
  top: 0;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #e50914;
}

/* HERO */
.hero {
  height: 60vh;
  background: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') center/cover;
  display: flex;
  align-items: flex-end;
  padding: 40px;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, #0b0b0b, transparent);
}

.hero-content {
  position: relative;
  max-width: 600px;
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  color: #ccc;
}

/* ROWS */
.row {
  margin: 20px;
}

.row h2 {
  margin-left: 10px;
}

/* SCROLL SECTION */
.row-posters {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
}

.row-posters::-webkit-scrollbar {
  display: none;
}

/* CARD */
.card {
  min-width: 220px;
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.3s;
  flex-shrink: 0;
}

.card:hover {
  transform: scale(1.08);
}

.card iframe {
  width: 100%;
  height: 130px;
}

.card p {
  padding: 8px;
  font-size: 14px;
  color: #ccc;
}

/* SEARCH */
.search {
  text-align: center;
  margin: 20px;
}

.search input {
  width: 300px;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}
</style>

</head>

<body>

<div class="nav">
  <div class="logo">Bir Sayfa Daha</div>
</div>

<div class="hero">
  <div class="hero-content">
    <h1>Sesli Kitap Dünyası</h1>
    <p>Franz Kafka, Sabahattin Ali ve daha fazlası</p>
  </div>
</div>

<div class="search">
  <input type="text" id="search" placeholder="Kitap ara...">
</div>

<!-- ROW 1 -->
<div class="row">
  <h2>📚 Sesli Kitaplar</h2>
  <div class="row-posters">

    <div class="card">
      <iframe src="https://www.youtube.com/embed/0My5Kwsf_8E"></iframe>
      <p>Dönüşüm - Kafka</p>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/PZl1l5HQPEw"></iframe>
      <p>Sesli Kitap 2</p>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/2QrnSaKU2xM"></iframe>
      <p>Sesli Kitap 3</p>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/NBdGBmR4L-Q"></iframe>
      <p>Sesli Kitap 4</p>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/L_L51vPvyDU"></iframe>
      <p>Sesli Kitap 5</p>
    </div>

  </div>
</div>

<!-- ROW 2 -->
<div class="row">
  <h2>📖 Öyküler</h2>
  <div class="row-posters">

    <div class="card">
      <iframe src="https://www.youtube.com/embed/rj5wrCWFkuQ"></iframe>
      <p>Öykü 1</p>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/PCl8tDsAGIY"></iframe>
      <p>Öykü 2</p>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/HP3A19271RY"></iframe>
      <p>Öykü 3</p>
    </div>

  </div>
</div>

<!-- ROW 3 -->
<div class="row">
  <h2>📕 Klasikler</h2>
  <div class="row-posters">

    <div class="card">
      <iframe src="https://www.youtube.com/embed/1nW9jwYbVns"></iframe>
      <p>Klasik 1</p>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/Le6wuK9lIUI"></iframe>
      <p>Klasik 2</p>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/tDWNQUNyBlU"></iframe>
      <p>Klasik 3</p>
    </div>

  </div>
</div>

<script>
const search = document.getElementById("search");

search.addEventListener("input", function() {
  const value = this.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const text = card.innerText.toLowerCase();
    card.style.display = text.includes(value) ? "block" : "none";
  });
});
</script>

</body>
</html>
