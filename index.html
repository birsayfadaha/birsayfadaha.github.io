<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bir Sayfa Daha</title>

<style>
body{
  margin:0;
  font-family: system-ui, Arial;
  color:white;

  background-image: url("birsayadahagithub.png");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* HEADER */
header{
  text-align:center;
  padding:50px 20px;
  background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent);
  backdrop-filter: blur(6px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

header h1{
  font-size:48px;
}

header p{
  color:#aaa;
}

/* TITLE */
.section-title{
  text-align:center;
  font-size:34px;
  margin-top:60px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  background:#141414;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card iframe{
  width:100%;
  height:180px;
  border:none;
}

footer{
  text-align:center;
  padding:30px;
  color:#777;
}
</style>

</head>

<body>

<header>
  <h1>📖 Bir Sayfa Daha</h1>
  <p>Sesli kitaplar • Hikayeler • Klasikler</p>
</header>

<h2 class="section-title">🔥 Popüler / Güncel Videolar</h2>
<section class="grid" id="videos"></section>

<h2 class="section-title">📱 Shorts</h2>
<section class="grid" id="shorts"></section>

<footer>
  © 2026 Bir Sayfa Daha - Yusuf Kızılca
</footer>

<script>

/* 🔴 BURAYI DOLDUR */
const CHANNEL_ID = "UC76ZL900DvgEjuWcMYMyEjQ";

const RSS = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;

async function load(){
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(RSS));
  const data = await res.json();

  const videos = data.items;

  // 🔥 SON 8 VİDEO
  const latest = videos.slice(0, 8);

  // 📱 SHORTS
  const shorts = videos.filter(v => v.title.toLowerCase().includes("#shorts")).slice(0, 6);

  render(latest, "videos");
  render(shorts, "shorts");
}

function render(list, id){
  const el = document.getElementById(id);
  el.innerHTML = "";

  list.forEach(v=>{
    const videoId = v.link.split("v=")[1];

    el.innerHTML += `
      <div class="card">
        <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
      </div>
    `;
  });
}

load();

</script>

</body>
</html>
