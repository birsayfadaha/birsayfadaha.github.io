<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bir Sayfa Daha</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

/* HEADER */
header {
  padding: 30px;
  text-align: center;
  background: linear-gradient(black, #111);
}

header h1 {
  font-size: 42px;
}

/* SEARCH */
.search-box {
  text-align: center;
  margin: 20px;
}

.search-box input {
  padding: 12px;
  width: 320px;
  border-radius: 25px;
  border: none;
  outline: none;
}

/* FILTER */
.categories {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin: 20px;
}

.categories button {
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  background: #222;
  color: white;
  cursor: pointer;
}

.categories button:hover {
  background: #444;
}

/* GRID (Netflix vibe) */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 18px;
  padding: 20px;
}

/* CARD */
.card {
  background: #1a1a1a;
  border-radius: 14px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.06);
}

.card iframe {
  width: 100%;
  height: 170px;
  border: none;
}

.card h3 {
  margin: 10px;
  font-size: 16px;
}

.card span {
  margin: 0 10px 10px;
  display: block;
  color: #aaa;
  font-size: 13px;
}

.tag {
  margin: 0 10px 10px;
  font-size: 11px;
  color: #00ffcc;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #777;
}
</style>
</head>

<body>

<header>
  <h1>📖 Bir Sayfa Daha</h1>
  <p>Sesli kitaplar • Hikayeler • Klasikler</p>
</header>

<div class="search-box">
  <input type="text" id="search" placeholder="Kitap ara...">
</div>

<div class="categories">
  <button onclick="filter('all')">Tümü</button>
  <button onclick="filter('roman')">Roman</button>
  <button onclick="filter('oyku')">Öykü</button>
  <button onclick="filter('siir')">Şiir</button>
  <button onclick="filter('unknown')">Diğer</button>
</div>

<section class="grid" id="grid"></section>

<footer>
  © 2026 Bir Sayfa Daha - Yusuf Kızılca
</footer>

<script>

/* =========================

   ========================= */

];

/* =========================
   🎬 RENDER
   ========================= */

const grid = document.getElementById("grid");

function render(list){
  grid.innerHTML = "";

  list.forEach(v => {
    grid.innerHTML += `
      <div class="card" data-category="${v.category}">
        <iframe src="https://www.youtube.com/embed/${v.id}"></iframe>
        <h3>${v.title}</h3>
        <span>${v.author}</span>
        <div class="tag">${v.category}</div>
      </div>
    `;
  });
}

render(videos);

/* =========================
   🔍 SEARCH
   ========================= */

document.getElementById("search").addEventListener("input", e => {
  let val = e.target.value.toLowerCase();

  let filtered = videos.filter(v =>
    v.title.toLowerCase().includes(val) ||
    v.author.toLowerCase().includes(val)
  );

  render(filtered);
});

/* =========================
   🎯 FILTER
   ========================= */

function filter(cat){
  if(cat === "all") return render(videos);
  render(videos.filter(v => v.category === cat));
}

</script>

</body>
</html>
