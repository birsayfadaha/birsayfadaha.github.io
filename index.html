<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bir Sayfa Daha</title>

<style>
body{
  margin:0;
  font-family: system-ui, Arial;
  color:white;
  background: radial-gradient(circle at top, #1b2a4a 0%, #0a0a0a 60%, #000 100%);
}

/* HEADER */
header{
  text-align:center;
  padding:50px 20px;
  background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent);
  backdrop-filter: blur(6px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

header h1{
  font-size:48px;
  letter-spacing:1px;
  text-shadow:0 0 20px rgba(120,150,255,0.4);
}

header p{
  color:#aaa;
}

/* SECTION TITLE */
.section-title{
  text-align:center;
  font-size:34px;
  margin-top:60px;
  margin-bottom:10px;
  font-weight:600;
  position:relative;
}

.section-title::after{
  content:"";
  display:block;
  width:120px;
  height:2px;
  margin:10px auto 0;
  background: linear-gradient(90deg, transparent, #6ea8ff, transparent);
}

/* SUB TITLE */
.sub-title{
  text-align:center;
  font-size:22px;
  margin-top:20px;
  color:#ccc;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  background:#141414;
  border-radius:16px;
  overflow:hidden;
  transition:0.25s;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
  transform:scale(1.06);
  box-shadow:0 15px 40px rgba(110,168,255,0.25);
}

.card iframe{
  width:100%;
  height:180px;
  border:none;
  filter: contrast(1.05) saturate(1.1);
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  color:#666;
  border-top:1px solid rgba(255,255,255,0.08);
  margin-top:40px;
}
</style>

</head>

<body>

<header>
  <h1>📖 Bir Sayfa Daha</h1>
  <p>Sesli kitaplar • Hikayeler • Klasikler</p>
</header>

<!-- ÖZETLER -->
<h2 class="section-title">Sesli Kitap Özetleri</h2>
<section class="grid" id="ozetler"></section>

<!-- ROMANLAR -->
<h2 class="section-title">Sesli Romanlar</h2>
<section class="grid" id="romanlar"></section>

<!-- ÖYKÜLER -->
<h2 class="section-title">Sesli Öyküler</h2>
<section class="grid" id="oykuler"></section>

<!-- ŞİİRLER -->
<h2 class="section-title">Sesli Şiirler</h2>

<h3 class="sub-title">Videolar</h3>
<section class="grid" id="siir-videolar"></section>

<h3 class="sub-title">Shorts</h3>
<section class="grid" id="siir-shorts"></section>

<footer>
  © 2026 Bir Sayfa Daha - Yusuf Kızılca
</footer>

/* ===== RENDER ===== */

function render(list, targetId){

}

/* ÇALIŞTIR */
